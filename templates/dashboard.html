<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<!-- Background Image -->
<body style="
    background: url('https://images.unsplash.com/photo-1508780709619-79562169bc64') no-repeat center center fixed;
    background-size: cover;
">

<!-- Light Overlay -->
<div style="background: rgba(255,255,255,0.85); min-height: 100vh;">

    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-dark px-4">
        <span class="navbar-brand fw-bold">SocialPosts 🚀</span>
        <form method="post" action="/logout">
            <button class="btn btn-outline-light btn-sm">Logout</button>
        </form>
    </nav>

    <div class="container py-5">

        <!-- Profile Section -->
        <div class="text-center mb-5">
            <div class="bg-primary text-white rounded-circle d-inline-flex 
                align-items-center justify-content-center shadow"
                style="width:90px;height:90px;font-size:32px;">
                {{ current_user[0].upper() }}
            </div>

            <h2 class="fw-bold mt-3">Welcome, {{ current_user }}</h2>
            <p class="text-muted">Manage your account smartly ⚡</p>
        </div>

        <!-- Cards -->
        <div class="row g-4 justify-content-center">

            <!-- Card 1 -->
            <div class="col-md-6 col-lg-3">
                <div class="card border-0 shadow-lg rounded-4 text-center p-3 h-100">
                    <h5 class="fw-semibold">Update Email</h5>
                    <form method="get" action="/update_email/{{ user_id }}">
                        <button class="btn btn-primary rounded-pill mt-3 w-100">Update</button>
                    </form>
                </div>
            </div>

            <!-- Card 2 -->
            <div class="col-md-6 col-lg-3">
                <div class="card border-0 shadow-lg rounded-4 text-center p-3 h-100">
                    <h5 class="fw-semibold">Delete Account</h5>
                    <form method="post" action="/delete_account/{{ user_id }}">
                        <button class="btn btn-danger rounded-pill mt-3 w-100">Delete</button>
                    </form>
                </div>
            </div>

            <!-- Card 3 -->
            <div class="col-md-6 col-lg-3">
                <div class="card border-0 shadow-lg rounded-4 text-center p-3 h-100">
                    <h5 class="fw-semibold">View Users</h5>
                    <a href="{{ url_for('fetch_all') }}" class="btn btn-success rounded-pill mt-3 w-100">
                        Open
                    </a>
                </div>
            </div>

            <!-- Card 4 -->
            <div class="col-md-6 col-lg-3">
                <div class="card border-0 shadow-lg rounded-4 text-center p-3 h-100">
                    <h5 class="fw-semibold">Logout</h5>
                    <form method="post" action="/logout">
                        <button class="btn btn-outline-dark rounded-pill mt-3 w-100">
                            Logout
                        </button>
                    </form>
                </div>
            </div>

        </div>

    </div>

</div>

</body>

</html>
