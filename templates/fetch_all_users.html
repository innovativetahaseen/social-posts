<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>All Users</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand fw-bold">Users Panel</span>
    <a href="{{ url_for('dashboard', user_id=users[0].id) }}" class="btn btn-outline-light btn-sm">
        Dashboard
    </a>
</nav>

<div class="container py-5">

    <h2 class="fw-bold mb-4 text-center">All Users 👥</h2>

    <div class="row g-4">

        {% for u in users %}
        <div class="col-md-6 col-lg-4">
            <div class="card border-0 shadow-lg rounded-4 h-100">

                <div class="card-body text-center">

                    <!-- Avatar -->
                    <div class="bg-primary text-white rounded-circle d-inline-flex 
                        align-items-center justify-content-center mb-3 shadow"
                        style="width:60px;height:60px;">
                        {{ u.username[0].upper() }}
                    </div>

                    <h5 class="fw-semibold">{{ u.username }}</h5>
                    <p class="text-muted small">{{ u.email }}</p>

                    <div class="d-flex justify-content-center gap-2 mt-3">
                        <a href="{{ url_for('update_email', user_id=u.id) }}"
                            class="btn btn-primary btn-sm rounded-pill px-3">
                            Update
                        </a>

                        <a href="{{ url_for('delete_account', user_id=u.id) }}"
                            class="btn btn-danger btn-sm rounded-pill px-3">
                            Delete
                        </a>
                    </div>

                </div>

            </div>
        </div>
        {% endfor %}

    </div>

</div>

</body>

</html>
